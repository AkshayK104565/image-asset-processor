<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Access Denied</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070d;--surf:#0f0f1a;--bdr:#1e1e32;--err:#ef4444;--muted:#5a5a72;--txt:#e2e2f0}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;
  min-height:100vh;display:grid;place-items:center;padding:24px}
.box{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;
  padding:48px;max-width:420px;text-align:center}
.icon{font-size:48px;margin-bottom:16px}
h1{font-size:22px;font-weight:800;margin-bottom:8px}
p{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:6px}
.email{font-family:'DM Mono',monospace;font-size:12px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
  border-radius:6px;padding:6px 12px;display:inline-block;color:#f87171;margin:12px 0}
a{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;
  text-decoration:none;border-bottom:1px solid var(--bdr);padding-bottom:2px}
a:hover{color:var(--txt)}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔒</div>
  <h1>Access Denied</h1>
  <p>Your Google account is not authorised to use this application.</p>
  <div class="email">{{ email }}</div>
  <p>Please contact the administrator to request access.</p>
  <br>
  <a href="/logout">← Try a different account</a>
</div>
</body>
</html>
